name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
        
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'
        
    - name: Install dependencies
      run: npm install
      
    - name: Lint Code Base
      run: npm run lint
      
    - name: Type Check (No Any allowed)
      run: npm run typecheck
      
    - name: Run Tests
      run: npm run test

  e2e-pixel-check:
    runs-on: ubuntu-latest
    needs: frontend-check
    defaults:
      run:
        working-directory: ./frontend
    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'

    - name: Install dependencies
      run: npm install

    - name: Install Playwright Chromium (with system deps)
      run: npx playwright install --with-deps chromium

    # 仅跑 canvas_pixel（不依赖后端的 X 哨兵）。generator_pixel 自带
    # test.skip(!!process.env.CI) 会自动跳过；待后端在 CI 起来后再开。
    # 首期 continue-on-error 防止跨平台像素差异（Win baseline ↔ Linux SwiftShader）
    # 把 main 卡住；稳定 1-2 周后摘掉。
    - name: Run Playwright canvas pixel sentinels
      continue-on-error: true
      run: npx playwright test canvas_pixel

    - name: Upload Playwright report on failure
      if: failure() || always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: |
          frontend/playwright-report/
          frontend/test-results/
        retention-days: 7
        if-no-files-found: ignore

  backend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
        
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn pydantic pybullet networkx trimesh scipy numpy meilisearch python-multipart
        pip install pytest ruff mypy httpx pytest-asyncio
        
    - name: Lint with Ruff
      run: ruff check backend/
      
    - name: Type check with Mypy
      run: mypy backend
      
    - name: Run Pytest
      run: pytest backend/tests/ -v
