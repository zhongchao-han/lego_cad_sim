name: Daily Full Unit Tests

on:
  schedule:
    # 每天凌晨 3:00 (北京时间) = 19:00 (UTC)
    - cron: '0 19 * * *'
  workflow_dispatch: # 允许手动手动触发检测

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy trimesh scipy fastapi uvicorn pydantic mypy ruff # 增加审计工具

      - name: Backend Type Analysis (Mypy)
        run: |
          # [TRACER] 严格检查 Python 类型契约
          python -m mypy backend --ignore-missing-imports --explicit-package-bases

      - name: Backend Static Code Audit (Ruff)
        run: |
          # 快速检查代码中的拼写错误或规范问题
          python -m ruff check backend

      - name: Run Backend Unit Tests
        run: |
          # 核心：执行所有 v1.3 物理对齐测试及遗留逻辑测试
          python -m unittest backend/tests/test_v1_3_metrics.py \
                            backend/tests/test_6558_sampling.py \
                            backend/tests/test_port_connections.py \
                            backend/tests/test_port_parsing.py \
                            backend/tests/test_port_library_manager.py

      # --- [新增] 前端静态质量审计环节 ---
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Frontend Static Type Analysis (TS Audit)
        working-directory: ./frontend
        run: npx tsc --noEmit # 核心检查命令：如果不通过，CI 流程将直接中断报错
        
      - name: Frontend ESLint Audit
        working-directory: ./frontend
        run: npm run lint # 额外增加：检查未定义的变量、未使用的导入等代码规范问题
